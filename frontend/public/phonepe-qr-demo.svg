<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- QR Code Pattern (Demo) -->
  <rect width="200" height="200" fill="white"/>
  
  <!-- Position Detection Patterns -->
  <!-- Top Left -->
  <g fill="black">
    <rect x="10" y="10" width="30" height="30"/>
    <rect x="15" y="15" width="20" height="20" fill="white"/>
    <rect x="20" y="20" width="10" height="10" fill="black"/>
  </g>
  
  <!-- Top Right -->
  <g fill="black">
    <rect x="160" y="10" width="30" height="30"/>
    <rect x="165" y="15" width="20" height="20" fill="white"/>
    <rect x="170" y="20" width="10" height="10" fill="black"/>
  </g>
  
  <!-- Bottom Left -->
  <g fill="black">
    <rect x="10" y="160" width="30" height="30"/>
    <rect x="15" y="165" width="20" height="20" fill="white"/>
    <rect x="20" y="170" width="10" height="10" fill="black"/>
  </g>
  
  <!-- Data Pattern -->
  <g fill="black">
    <rect x="50" y="30" width="10" height="10"/>
    <rect x="70" y="30" width="10" height="10"/>
    <rect x="90" y="30" width="10" height="10"/>
    
    <rect x="30" y="50" width="10" height="10"/>
    <rect x="50" y="50" width="10" height="10"/>
    <rect x="70" y="50" width="10" height="10"/>
    <rect x="120" y="50" width="10" height="10"/>
    
    <rect x="40" y="70" width="10" height="10"/>
    <rect x="60" y="70" width="10" height="10"/>
    <rect x="80" y="70" width="10" height="10"/>
    <rect x="100" y="70" width="10" height="10"/>
    <rect x="130" y="70" width="10" height="10"/>
    
    <rect x="45" y="90" width="10" height="10"/>
    <rect x="65" y="90" width="10" height="10"/>
    <rect x="95" y="90" width="10" height="10"/>
    <rect x="115" y="90" width="10" height="10"/>
    
    <rect x="30" y="110" width="10" height="10"/>
    <rect x="50" y="110" width="10" height="10"/>
    <rect x="80" y="110" width="10" height="10"/>
    <rect x="110" y="110" width="10" height="10"/>
    
    <rect x="55" y="130" width="10" height="10"/>
    <rect x="75" y="130" width="10" height="10"/>
    <rect x="100" y="130" width="10" height="10"/>
    <rect x="125" y="130" width="10" height="10"/>
  </g>
  
  <!-- PhonePe Branding Text -->
  <text x="100" y="185" font-size="12" font-weight="bold" text-anchor="middle" fill="black">
    PhonePe (Demo QR)
  </text>
</svg>